<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="stylesheet" href="../CSS/style.css">
    <title>MS | Studio</title>
</head>
<body>
    <header>
        
        <div class="header-1">
            <div class="header__logo">
                <img src="../images/logo.png" class="header__logo-image" alt="">
                <p class="header__Name"> MS | Studio</p>
            </div>
            <nav class="header__nav">
            <div class="header__container-manu">
                <button >
                  <a href="../pages/menu.html"><img src="../images/manu.png" class="header__menu-image" alt=""></a>
                    
                </button> 
            </div>
            </nav>
        </div>
        <div class="header-2">
            <h1>Architect Studio</h1>
            <p>armony  and style for home</p>
        </div>
    </header>
    <main>
       <section class="contact-us">
         <h2>Contact Us</h2>
       </section>
       <section class="contact-form">
            <h2 class="contact-form__title">Start your Project</h2>
            <form action="" method="get" enctype="multipart/form-data">
                <input id="full-name" type="text" placeholder="Full Name">
                <div>
                    <input id="email" type="email" placeholder="E-mail">
                    <input id="phone" type="text" placeholder="Phone">
                </div>
                <textarea name="" id="description" cols="30" rows="10" placeholder="Describe your proyect"></textarea>
                <div>
                    <input id="submit" type="submit" value="Send Request">
                </div>
            
            </form>
       </section>
    </main>
    <footer>
        <div class="footer_contariner">
            <p>© Florencia Sánchez Valiño 2023</p>  
            <p>Facebook</p>
            <P>Instagram</P>
        </div> 
        <div class="footer_contariner">
            <p>Malabia 1337 departament 10</p>
            <p>+549-11-3027-9809</p>
        </div>
    </footer>
